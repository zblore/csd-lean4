name = "csd-lean4"
defaultTargets = ["CsdLean4"]

# Pin Mathlib to a specific commit for reproducible builds.
# Bump in lockstep with `lean-toolchain` (currently v4.33.0-rc1).
[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4"
rev = "c732b96d05efdb1fb84511dfdc24a8f70005ae99"

# Library target: LF1–LF5 + Empirical + Mathlib upstream-tracking.
# Consumers `import CsdLean4` or `import CsdLean4.Basic` get the full
# development. `CsdLean4.Basic` is listed as an explicit root because it is
# not imported by the root module (it imports the root, not vice versa) —
# without this it would sit outside the build graph and CI would never
# check it (which is how its import list silently rotted pre-2026-06-11).
# The Tests/ subtree is excluded from this target.
[[lean_lib]]
name = "CsdLean4"
roots = ["CsdLean4", "CsdLean4.Basic"]

# Test target: AxiomAudit regression suite (`#guard_msgs` pins on
# `#print axioms` for every headline theorem) and Examples worked
# computations. Build with `lake build CsdLeanTests`. CI exercises
# both targets (see `.github/workflows/ci.yml`); drift detection
# requires this target to be built, not just the library.
[[lean_lib]]
name = "CsdLeanTests"
roots = ["CsdLean4.Tests.AxiomAudit", "CsdLean4.Tests.Examples"]

# Separate target for the ecdsa.fail / ECDLP quantum-cryptanalysis track
# (CsdLean4/Ecdsafail/). NOT part of core QM: `lake build CsdLean4` and
# `lake build CsdLeanTests` do not build it. Its axiom-audit pins live in
# `CsdLean4.Ecdsafail.AxiomAudit`, which transitively imports the 21 ecdsa modules.
[[lean_lib]]
name = "Ecdsafail"
roots = ["CsdLean4.Ecdsafail.AxiomAudit"]
