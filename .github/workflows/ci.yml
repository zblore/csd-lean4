name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build CsdLean4 (library)
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: true
          build-args: "CsdLean4"

      - name: Build CsdLeanTests (regression suite + examples)
        run: lake build CsdLeanTests
