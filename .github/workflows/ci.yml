name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build CsdLean4 (library)
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: true
          build-args: "CsdLean4"
          use-mathlib-cache: true

      - name: Build CsdLeanTests (regression suite + examples)
        run: lake build CsdLeanTests

      - name: Static audit guards (connectivity / sector-linkage / axiom-imports)
        run: |
          bash scripts/check-connectivity.sh
          bash scripts/check-sector-linkage.sh
          bash scripts/check-axiom-imports.sh
